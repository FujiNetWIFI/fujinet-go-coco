repository: https://github.com/FujiNetWIFI/fujinet-go-coco
description: FujiNet Go CoCo is a portable Tandy Color Computer emulator for Android with built-in FujiNet support, bringing modern networking to classic computing. Run your favorite CoCo software while accessing network-hosted disk images, services, and multiplayer experiences just like real FujiNet hardware, but entirely in software. The XRoar emulator and the FujiNet firmware run together in one app, joined over the Becker port (DriveWire-over-TCP). Switch between CoCo 2 and CoCo 3, and between RGB and Composite display. Take your Color Computer anywhere! No cables, no disks, no limits!
summary: FujiNet Go CoCo brings the classic Tandy Color Computer experience to Android with built-in FujiNet support
